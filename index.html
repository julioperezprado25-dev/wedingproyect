<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* FONDO IMAGEN ANIMADA */
.bg-img{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
z-index:-3;
opacity:0;
transition:2s;
animation:zoom 12s infinite alternate;
}

.bg-img.show{opacity:1;}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

.overlay{
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.3);
z-index:-2;
opacity:0;
transition:2s;
pointer-events:none;
}

.overlay.show{opacity:1;}

/* INTRO */
.intro{
position:fixed;
width:100vw;height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* SOBRE */
.envelope{
position:relative;
width:340px;
height:240px;
cursor:pointer;
}

/* cuerpo */
.envelope-body{
position:absolute;
width:100%;
height:100%;
background:#e6c27a;
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* tapa estilo carta */
.envelope-flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:#d9b36a;
clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
transform-origin:top;
transition:1s;
z-index:2;
}

.envelope.open .envelope-flap{
transform:rotateX(180deg);
}

/* logo superior */
.logo{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes',cursive;
font-size:28px;
color:#3e2c00;
}

/* sello */
.seal{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
background:#b71c1c;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
font-size:22px;
font-weight:bold;
z-index:3;
box-shadow:0 5px 10px rgba(0,0,0,0.5);
}

/* animación caída */
.envelope.drop{
transform:translateY(600px);
transition:2s;
}

/* TEXTO CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
width:90%;
max-width:600px;
max-height:80vh;
overflow:auto;

padding:30px;
border-radius:8px;

font-family:'Great Vibes',cursive;
font-size:26px;
text-align:center;
color:#2b2b2b;

background:linear-gradient(#f4e4c1,#ecd8a6);

box-shadow:0 25px 60px rgba(0,0,0,0.5);

transform:translate(-50%,-50%) scale(0.2);
opacity:0;
z-index:10000;

transition:2s;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.letter.fade{
opacity:0;
transition:3s;
}

/* TEXTO EFECTO MAGICO */
#texto div{
opacity:0;
transform:translateY(20px);
filter:blur(10px);
transition:1s;
}

/* CONTENIDO */
.main{
opacity:0;
transition:2s;
position:relative;
z-index:5;
}

.main.show{opacity:1;}

section{
padding:60px 20px;
background:rgba(255,255,255,0.05);
margin:20px;
border-radius:20px;
position:relative;
z-index:5;
}

/* BOTONES */
.btn{
display:inline-block;
padding:12px 20px;
border-radius:20px;
background:#2e7d32;
color:#fff;
text-decoration:none;
margin:10px;
position:relative;
z-index:10;
}

</style>
</head>

<body>

<img src="fondo.jpg" class="bg-img" id="bgimg">
<div class="overlay" id="overlay"></div>

<!-- INTRO -->
<div class="intro" id="intro">

<div class="envelope">

<div class="envelope-body"></div>
<div class="envelope-flap"></div>

<div class="logo">I & J</div>

<div class="seal" onclick="abrirSobre()">IJ</div>

</div>

</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div>
</div>

<!-- CONTENIDO -->
<div class="main" id="main">

<section>
<h2>Detalles del Evento</h2>

<p>
La misa será a las 7:00 PM<br>
Parroquia San José – Jesús María
</p>

<a href="https://www.google.com/maps/search/?api=1&query=-12.06412670,-77.08234230" target="_blank" class="btn">
📍 Google Maps
</a>

<a href="https://waze.com/ul?ll=-12.06412670,-77.08234230&navigate=yes" target="_blank" class="btn">
🚗 Waze
</a>

</section>

</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

const mensaje = `Eres una persona muy especial para nosotros,

y queremos invitarte a compartir

uno de los días más importantes de nuestras vidas.

Nos encantaría contar contigo

en este momento lleno de amor y felicidad 💍`;

function efectoTinta(){

let cont = document.getElementById("texto");
cont.innerHTML="";

let lineas = mensaje.split("\n");

lineas.forEach((linea,i)=>{

let div = document.createElement("div");
div.textContent = linea;

cont.appendChild(div);

setTimeout(()=>{
div.style.opacity=1;
div.style.transform="translateY(0)";
div.style.filter="blur(0)";
}, i*800);

});

}

function abrirSobre(){

let env=document.querySelector(".envelope");
let carta=document.getElementById("carta");

env.classList.add("open");

setTimeout(()=>{
env.classList.add("drop");
carta.classList.add("show");
},1000);

setTimeout(()=>{
efectoTinta();
},2000);

let duracion = mensaje.split("\n").length * 800 + 4000;

setTimeout(()=>{
carta.classList.add("fade");
},duracion);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
document.getElementById("bgimg").classList.add("show");
document.getElementById("overlay").classList.add("show");
document.getElementById("musica").play().catch(()=>{});
},duracion+3000);

}

</script>

</body>
</html>
