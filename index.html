<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden;}

/* VIDEO */
.bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:-3;
}
.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.4);z-index:-2;
}

/* INTRO */
.intro{
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* SOBRE */
.envelope{
position:relative;
width:340px;
height:240px;
cursor:pointer;
}

.body-envelope{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(135deg,#f5c6d6,#f2a1c2);
border-radius:10px;
}

.flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:#e48fb1;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

.envelope.drop{
transform:translateY(600px);
transition:2s ease;
}

/* CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
width:80vw;
max-width:700px;
padding:40px;
border-radius:12px;

font-family:'Great Vibes',cursive;
font-size:28px;
text-align:center;
color:#333;

background:
linear-gradient(white,#fdfdfd),
repeating-linear-gradient(
0deg,
rgba(0,0,0,0.02) 0px,
rgba(0,0,0,0.02) 1px,
transparent 1px,
transparent 4px
);

box-shadow:
0 30px 60px rgba(0,0,0,0.4),
inset 0 0 40px rgba(0,0,0,0.05);

transform:translate(-50%, -50%) scale(0.2) rotateX(60deg);
opacity:0;
z-index:10000;

transition:all 2s ease;
}

.letter.show{
opacity:1;
transform:translate(-50%, -50%) scale(1) rotateX(0deg);
}

.letter.expand{
transform:translate(-50%, -50%) scale(1.4);
}

/* fade */
.letter.fade{
opacity:0;
transition:3s ease;
}

/* TEXTO */
#texto{
min-height:200px;
}

/* cursor efecto */
.cursor{
display:inline-block;
width:2px;
background:#333;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* SECCIONES */
section{
padding:80px 20px;
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
margin:20px;
border-radius:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:10px;
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay"></div>

<!-- INTRO -->
<div id="intro" class="intro">
<div class="envelope" onclick="abrirSobre()">
<div class="flap"></div>
<div class="body-envelope"></div>
</div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div><span class="cursor"></span>
</div>

<!-- CONTENIDO -->
<section>
<h1>Ivon & Julio</h1>
<p>14 Agosto 2026 · 8:30 PM</p>
</section>

<section>
<h2>Detalles del Evento</h2>

<p>
La misa se celebrará a las 7:00 PM<br>
Parroquia San José – Jesús María<br><br>

La recepción se realizará en:<br>
(Ver ubicación abajo)<br><br>

Llegar temprano<br>
Llevar abrigo
</p>

<button onclick="window.open('https://maps.app.goo.gl/wC8v6kQmJdUNZViA6','_blank')">
📍 Google Maps
</button>

<button onclick="window.open('https://ul.waze.com/ul?navigate=yes','_blank')">
🚗 Waze
</button>

</section>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

const mensaje = `Ivon & Julio

Con mucho amor queremos invitarte
a compartir uno de los días más importantes
de nuestras vidas 💍

Tu presencia hará este momento aún más especial`;

function escribirTexto(){
let i=0;
let speed=40;
let textoDiv=document.getElementById("texto");

function escribir(){
if(i < mensaje.length){
textoDiv.innerHTML += mensaje.charAt(i) === "\n" ? "<br>" : mensaje.charAt(i);
i++;
setTimeout(escribir, speed);
}
}
escribir();
}

function abrirSobre(){

let env=document.querySelector(".envelope");
let carta=document.getElementById("carta");

/* abrir (1s) */
env.classList.add("open");

/* bajar + mostrar carta */
setTimeout(()=>{
env.classList.add("drop");
carta.classList.add("show");
},1000);

/* expandir */
setTimeout(()=>{
carta.classList.add("expand");
escribirTexto(); /* inicia escritura */
},2000);

/* fade después de 8s */
setTimeout(()=>{
carta.classList.add("fade");
},10000);

/* mostrar web */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("musica").play().catch(()=>{});
},13000);

}

</script>

</body>
</html>
