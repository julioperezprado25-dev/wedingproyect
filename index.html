<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivon & Julio</title>

<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{color:#fff;overflow-x:hidden;}

/* VIDEO */
.bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:-3;
}
.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.5);z-index:-2;
}

/* INTRO */
.intro{
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
}

/* SOBRE */
.envelope{
position:relative;
width:320px;height:220px;
cursor:pointer;
}

.top,.bottom{
position:absolute;width:100%;height:50%;
background:#ad5b73;
transition:1s;
}

.top{
top:0;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
}

.bottom{
bottom:0;
clip-path:polygon(0 100%,100% 100%,50% 0);
transform-origin:bottom;
}

.letter{
position:absolute;
width:100%;height:100%;
background:#fff;color:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
border-radius:10px;
transform:scale(0.8);
opacity:0;
transition:1s;
}

.envelope.open .top{
transform:rotateX(180deg) translateY(-50px);
}
.envelope.open .bottom{
transform:rotateX(-180deg) translateY(50px);
}
.envelope.open .letter{
transform:scale(1.2);
opacity:1;
}

/* SECCIONES */
section{
padding:80px 20px;
text-align:center;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
margin:20px;
border-radius:20px;
}

/* BOTONES */
button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:5px;
}

/* GALERÍA */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
z-index:999;
}
.modal-content{
background:#fff;color:#000;
padding:20px;
margin:50px auto;
max-width:500px;
border-radius:12px;
}
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}
.grid img{width:100%;border-radius:10px;}

/* PÉTALOS */
.petal{
position:fixed;
top:-10px;
width:10px;height:10px;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay"></div>

<!-- INTRO -->
<div id="intro" class="intro">
<div class="envelope" onclick="abrirSobre()">
<div class="top"></div>
<div class="bottom"></div>

<div class="letter">
<h2 id="nombreInvitado">Invitado</h2>
<p>Estás invitado a la boda de</p>
<h3>Ivon & Julio</h3>
<p>14 Agosto · 8:30 PM</p>
<small>Haz clic para abrir</small>
</div>

</div>
</div>

<!-- CONTENIDO -->
<section>
<h1>Ivon & Julio</h1>
<p>14 Agosto 2026 · 8:30 PM</p>
</section>

<section>
<h2>Detalles del Evento</h2>
<button onclick="window.open('https://maps.google.com/?q=-12.0464,-77.0428')">Ubicación</button>
<button onclick="window.open('https://waze.com/ul?ll=-12.0464,-77.0428&navigate=yes')">Waze</button>
<p>Elegante · Llevar abrigo</p>
</section>

<section>
<h2>Déjanos un mensaje ❤️</h2>
<input id="nombre" placeholder="Tu nombre">
<textarea id="mensaje"></textarea>
<button onclick="guardarMensaje()">Enviar</button>
</section>

<section>
<h2>Fotos 📸</h2>
<button onclick="abrirGaleria()">Abrir Galería</button>
</section>

<!-- GALERÍA -->
<div id="galeria" class="modal">
<div class="modal-content">
<h2>Galería</h2>
<div id="gridFotos" class="grid"></div>

<input id="nombreFoto" placeholder="Nombre">
<input type="file" id="foto">

<button onclick="subirFoto()">Subir</button>
<button onclick="cerrarGaleria()">Cerrar</button>
</div>
</div>

<audio id="musica" src="musica.mp3" loop></audio>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>

/* INVITADO DINÁMICO */
const params=new URLSearchParams(window.location.search);
const nombre=params.get("nombre");
if(nombre){
document.getElementById("nombreInvitado").innerText=decodeURIComponent(nombre);
}

/* ABRIR SOBRE */
function abrirSobre(){
let env=document.querySelector(".envelope");
env.classList.add("open");

setTimeout(()=>{
document.getElementById("intro").style.opacity="0";
},1500);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("musica").play();
},2200);
}

/* PÉTALOS */
function crearPetalos(){
const colores=["#f5c6d6","#a5d6a7","#81c784"];
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.background=colores[Math.floor(Math.random()*3)];
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}
}
crearPetalos();

/* FIREBASE */
const firebaseConfig={
apiKey:"TU_API_KEY",
authDomain:"TU.firebaseapp.com",
projectId:"TU",
storageBucket:"TU.appspot.com",
appId:"XXXX"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const storage=firebase.storage();

/* MENSAJE */
function guardarMensaje(){
db.collection("mensajes").add({
nombre:nombre.value,
mensaje:mensaje.value
});
alert("Mensaje enviado");
}

/* GALERÍA */
function abrirGaleria(){
document.getElementById("galeria").style.display="block";
cargarFotos();
}
function cerrarGaleria(){
document.getElementById("galeria").style.display="none";
}

function subirFoto(){
let file=document.getElementById("foto").files[0];
if(!file)return alert("Selecciona archivo");

let nombreArchivo=Date.now()+".jpg";

storage.ref("fotos/"+nombreArchivo)
.put(file)
.then(()=>{
db.collection("fotos").add({nombre:nombreArchivo});
alert("Subido");
cargarFotos();
});
}

function cargarFotos(){
db.collection("fotos").get().then(snap=>{
gridFotos.innerHTML="";
snap.forEach(doc=>{
storage.ref("fotos/"+doc.data().nombre)
.getDownloadURL().then(url=>{
let img=document.createElement("img");
img.src=url;
gridFotos.appendChild(img);
});
});
});
}

</script>

</body>
</html>
