<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden;}

/* VIDEO */
.bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:-3;
}
.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.5);z-index:-2;
}

/* INTRO */
.intro{
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
}

/* SOBRE */
.envelope{
position:relative;
width:340px;
height:240px;
cursor:pointer;
}

/* CUERPO */
.body-envelope{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(135deg,#f5c6d6,#f2a1c2);
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:1s;
z-index:1;
}

/* TAPA */
.flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:#e48fb1;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
z-index:2;
}

/* TEXTO DESLIZAR */
.hint{
position:absolute;
bottom:-40px;
width:100%;
text-align:center;
font-family:'Great Vibes',cursive;
font-size:20px;
color:#fff;
opacity:0.8;
}

/* CARTA */
.letter{
position:absolute;
bottom:0;
left:5%;
width:90%;
height:90%;
background:#fff;
color:#333;
border-radius:10px;
padding:30px;
text-align:center;
font-family:'Great Vibes',cursive;
font-size:26px;

transform:translateY(100%) scale(0.8);
opacity:0;
transition:1.5s;
z-index:0;
}

/* ANIMACIONES */

/* abrir tapa */
.envelope.open .flap{
transform:rotateX(180deg);
}

/* cuerpo baja */
.envelope.open .body-envelope{
transform:translateY(120px);
}

/* carta sale */
.envelope.open .letter{
transform:translateY(-40%) scale(1);
opacity:1;
}

/* zoom */
.envelope.zoom .letter{
transform:translateY(-40%) scale(2.5);
transition:2s;
}

/* fade final */
.fade-out{
opacity:0;
transition:1.5s;
}

/* SECCIONES */
section{
padding:80px 20px;
text-align:center;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
margin:20px;
border-radius:20px;
}

/* BOTONES */
button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:5px;
}

/* PÉTALOS */
.petal{
position:fixed;
top:-10px;
width:10px;height:10px;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<!-- VIDEO -->
<video class="bg-video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay"></div>

<!-- INTRO -->
<div id="intro" class="intro">

<div class="envelope" onclick="abrirSobre()">

<div class="flap"></div>
<div class="body-envelope"></div>

<div class="letter" id="cartaTexto">
Ivon & Julio<br><br>
Con mucho amor queremos invitarte<br>
a compartir uno de los días más importantes<br>
de nuestras vidas 💍<br><br>
Tu presencia hará este momento aún más especial
</div>

<div class="hint">Desliza hacia arriba para abrir</div>

</div>
</div>

<!-- CONTENIDO -->
<section>
<h1>Ivon & Julio</h1>
<p>14 Agosto 2026 · 8:30 PM</p>
</section>

<section>
<h2>Detalles del Evento</h2>

<button onclick="window.open('https://maps.app.goo.gl/wC8v6kQmJdUNZViA6')">
📍 Google Maps
</button>

<button onclick="window.open('https://ul.waze.com/ul?place=ChIJv2CrSkDJBZERkocHAm6SlYM&ll=-12.06412670%2C-77.08234230&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location')">
🚗 Waze
</button>

<p>
Elegante · Llevar abrigo
</p>
</section>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

/* ANIMACIÓN SOBRE */
function abrirSobre(){

let env=document.querySelector(".envelope");

/* abrir */
env.classList.add("open");

/* zoom carta */
setTimeout(()=>{
env.classList.add("zoom");
},1500);

/* fade */
setTimeout(()=>{
document.getElementById("intro").classList.add("fade-out");
},3500);

/* mostrar web */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("musica").play().catch(()=>{});
},4500);

}

/* PÉTALOS */
function crearPetalos(){
const colores=["#f5c6d6","#a5d6a7","#81c784"];
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.background=colores[Math.floor(Math.random()*3)];
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}
}
crearPetalos();

</script>

</body>
</html>
