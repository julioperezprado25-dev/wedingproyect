<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden;}

/* VIDEO */
.bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:-3;
}
.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.5);z-index:-2;
}

/* INTRO */
.intro{
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
perspective:1200px;
}

/* SOBRE */
.envelope{
position:relative;
width:340px;
height:240px;
cursor:pointer;
z-index:5;
}

.body-envelope{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(135deg,#f5c6d6,#f2a1c2);
border-radius:10px;
}

.flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:#e48fb1;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
z-index:6;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

.envelope.drop{
transform:translateY(600px);
transition:1.5s ease;
}

/* CARTA 3D */
.letter{
position:fixed;
top:50%;
left:50%;
width:80vw;
max-width:700px;
padding:40px;
border-radius:12px;

font-family:'Great Vibes',cursive;
font-size:28px;
text-align:center;
color:#333;

/* textura papel */
background:
linear-gradient(white, #fdfdfd),
repeating-linear-gradient(
0deg,
rgba(0,0,0,0.02) 0px,
rgba(0,0,0,0.02) 1px,
transparent 1px,
transparent 4px
);

box-shadow:
0 30px 60px rgba(0,0,0,0.4),
inset 0 0 40px rgba(0,0,0,0.05);

transform:
translate(-50%, -50%)
scale(0.2)
rotateX(70deg);

opacity:0;
z-index:10000;

transition:
transform 1.2s ease,
opacity 1s ease;
}

/* sale del sobre */
.letter.show{
opacity:1;
transform:
translate(-50%, -80%)
scale(0.9)
rotateX(40deg);
}

/* se centra y expande */
.letter.expand{
transform:
translate(-50%, -50%)
scale(1.2)
rotateX(0deg);
transition:2.5s cubic-bezier(0.22,1,0.36,1);
}

/* pantalla completa */
.letter.full{
width:100vw;
height:100vh;
border-radius:0;
display:flex;
justify-content:center;
align-items:center;
padding:60px;

transform:
translate(-50%, -50%)
scale(1.4)
rotateX(0deg);
}

/* fade elegante */
.letter.fade{
opacity:0;
transition:2.5s ease;
}

/* TEXTO */
.hint{
position:absolute;
bottom:-40px;
width:100%;
text-align:center;
font-family:'Great Vibes',cursive;
font-size:20px;
opacity:0.8;
}

/* SECCIONES */
section{
padding:80px 20px;
text-align:center;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
margin:20px;
border-radius:20px;
}

/* BOTONES */
button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:5px;
}

/* PÉTALOS */
.petal{
position:fixed;
top:-10px;
width:10px;height:10px;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay"></div>

<!-- INTRO -->
<div id="intro" class="intro">

<div class="envelope" onclick="abrirSobre()">
<div class="flap"></div>
<div class="body-envelope"></div>
<div class="hint">Toca el sobre</div>
</div>

</div>

<!-- CARTA -->
<div class="letter" id="carta">
Ivon & Julio<br><br>
Con mucho amor queremos invitarte<br>
a compartir uno de los días más importantes<br>
de nuestras vidas 💍<br><br>
Tu presencia hará este momento aún más especial
</div>

<!-- CONTENIDO -->
<section>
<h1>Ivon & Julio</h1>
<p>14 Agosto 2026 · 8:30 PM</p>
</section>

<section>
<h2>Detalles del Evento</h2>

<button onclick="window.open('https://maps.app.goo.gl/wC8v6kQmJdUNZViA6')">
📍 Google Maps
</button>

<button onclick="window.open('https://ul.waze.com/ul?place=ChIJv2CrSkDJBZERkocHAm6SlYM&ll=-12.06412670%2C-77.08234230&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location')">
🚗 Waze
</button>

<p>Elegante · Llevar abrigo</p>
</section>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

function abrirSobre(){

let env=document.querySelector(".envelope");
let carta=document.getElementById("carta");

/* abrir tapa */
env.classList.add("open");

/* carta sale */
setTimeout(()=>{
carta.classList.add("show");
},1000);

/* sobre baja SOLO */
setTimeout(()=>{
env.classList.add("drop");
},2000);

/* carta se centra */
setTimeout(()=>{
carta.classList.add("expand");
},3000);

/* pantalla completa */
setTimeout(()=>{
carta.classList.add("full");
},4000);

/* fade correcto */
setTimeout(()=>{
carta.classList.add("fade");
},5000);

/* mostrar web */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("musica").play().catch(()=>{});
},8000);

}

/* pétalos */
function crearPetalos(){
const colores=["#f5c6d6","#a5d6a7","#81c784"];
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.background=colores[Math.floor(Math.random()*3)];
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}
}
crearPetalos();

</script>

</body>
</html>
