<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow-x:hidden;}

/* VIDEO */
.bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:-3;opacity:0;transition:2s;
}
.bg-video.show{opacity:1;}

.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.4);
z-index:-2;opacity:0;transition:2s;
}
.overlay.show{opacity:1;}

/* INTRO */
.intro{
position:fixed;
width:100vw;height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

/* SOBRE REAL */
.envelope{
position:relative;
width:340px;
height:240px;
cursor:pointer;
}

/* base */
.envelope-body{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#f5c6d6,#e8a0bd);
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

/* solapa */
.envelope-flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:linear-gradient(145deg,#e48fb1,#d97aa0);
border-top-left-radius:10px;
border-top-right-radius:10px;
transform-origin:top;
transition:1s;
clip-path:polygon(0 0,100% 0,100% 75%,50% 100%,0 75%);
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

/* línea unión */
.envelope-line{
position:absolute;
top:118px;
width:100%;
height:2px;
background:rgba(0,0,0,0.2);
z-index:2;
}

.envelope.open .envelope-flap{
transform:rotateX(160deg);
}

.envelope.drop{
transform:translateY(600px);
transition:2s;
}

/* TEXTO */
.hint{
margin-top:20px;
font-family:'Great Vibes',cursive;
font-size:22px;
opacity:0.8;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%,100%{opacity:0.5;}
50%{opacity:1;}
}

/* CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
width:80vw;
max-width:700px;
padding:50px;
border-radius:8px;

font-family:'Great Vibes',cursive;
font-size:28px;
text-align:center;
color:#2b2b2b;

background:linear-gradient(#f4e4c1,#ecd8a6);

box-shadow:0 25px 60px rgba(0,0,0,0.5);

transform:translate(-50%,-50%) scale(0.2);
opacity:0;
z-index:10000;
transition:2s;
}

.letter.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.letter.expand{transform:translate(-50%,-50%) scale(1.4);}
.letter.fade{opacity:0;transition:3s;}

/* tinta */
#texto span{
opacity:0;
filter:blur(5px);
transition:0.4s;
white-space:pre;
}
#texto span.show{
opacity:1;
filter:blur(0);
}

/* CONTENIDO */
.main{
opacity:0;transition:2s;
}
.main.show{opacity:1;}

section{
padding:60px 20px;
text-align:center;
background:rgba(255,255,255,0.02); /* ultra transparente */
backdrop-filter:blur(15px);
margin:15px;
border-radius:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:10px;
}

input,textarea{
width:80%;
padding:10px;
margin:10px;
border-radius:10px;
border:none;
}

</style>
</head>

<body>

<video class="bg-video" id="video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay" id="overlay"></div>

<!-- INTRO -->
<div class="intro" id="intro">
<div class="envelope" onclick="abrirSobre()">
<div class="envelope-flap"></div>
<div class="envelope-body"></div>
<div class="envelope-line"></div>
</div>
<div class="hint">Toca el sobre para abrir</div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div>
</div>

<!-- CONTENIDO -->
<div class="main" id="main">

<section>
<h1>Ivon & Julio</h1>
<p>14 Agosto 2026 · 8:30 PM</p>
</section>

<section>
<h2>Detalles del Evento</h2>
<p>
La misa se celebrará a las 7:00 PM<br>
Parroquia San José – Jesús María<br><br>

La recepción será en:<br>
Ubicación abajo<br><br>

Llegar temprano<br>
Llevar abrigo
</p>

<button onclick="window.open('https://www.google.com/maps?q=-12.06412670,-77.08234230','_blank')">📍 Maps</button>
<button onclick="window.open('https://waze.com/ul?ll=-12.06412670,-77.08234230&navigate=yes','_blank')">🚗 Waze</button>

</section>

<section>
<h2>Álbum de Fotos</h2>
<button onclick="alert('Abrir álbum')">Ver álbum</button>
<input type="file" multiple>
</section>

<section>
<h2>Enviar mensaje a los novios</h2>
<input placeholder="Tu nombre">
<textarea placeholder="Escribe tu mensaje"></textarea>
<button>Enviar</button>
</section>

</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

const mensaje = `Eres una persona muy especial para nosotros,

y por ello queremos invitarte a compartir
uno de los días más importantes de nuestras vidas.

Nos encantaría contar con tu presencia
en este momento lleno de amor y alegría 💍`;

function efectoTinta(){
let cont=document.getElementById("texto");
cont.innerHTML="";

[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
cont.appendChild(s);

setTimeout(()=>s.classList.add("show"),i*25);
});
}

function abrirSobre(){

let env=document.querySelector(".envelope");
let carta=document.getElementById("carta");

env.classList.add("open");

setTimeout(()=>{
env.classList.add("drop");
carta.classList.add("show");
},1000);

setTimeout(()=>{
carta.classList.add("expand");
efectoTinta();
},2000);

/* tiempo dinámico */
let duracion = mensaje.length * 25 + 4000;

setTimeout(()=>{
carta.classList.add("fade");
},duracion);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
document.getElementById("video").classList.add("show");
document.getElementById("overlay").classList.add("show");
document.getElementById("musica").play().catch(()=>{});
},duracion+3000);

}

</script>

</body>
</html>
