<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio - Nuestra Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
}

body {
    font-family: 'Great Vibes', cursive;
    color: #3b2f1b;
    background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), url('papel.jpg');
    background-size: 350px;
}

/* ===== FLORES ===== */
.section-flores {
    position: fixed;
    width: 140px;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.section-flores.visible { opacity: 1; }
.flor-top-left { top: 20px; left: 20px; }
.flor-bottom-left { bottom: 20px; left: 20px; }
.flor-right-center { top: 50%; right: 20px; transform: translateY(-50%); }
.flor-img {
    width: 100%;
    animation: respirarFlor 6s infinite ease-in-out;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
}
@keyframes respirarFlor {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

/* ===== FONDO ===== */
.bg {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: -1;
    display: flex; justify-content: center; align-items: center;
    pointer-events: none;
}
.bg img {
    position: absolute;
    width: 70%;
    max-width: 750px;
    border-radius: 20px;
    opacity: 0;
    transition: 2s;
}
.bg img.active { opacity: 0.15; }

/* ===== INTRO ===== */
.intro {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
    background: #000;
    overflow: hidden;
}

/* ===== SOBRE ===== */
.envelope {
    position: relative;
    width: 280px;
    height: 400px;
    perspective: 1500px;
    cursor: default;
}

.envelope-back {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('sobre_back.png') no-repeat center center;
    background-size: 100% 100%;
    z-index: 0;
    opacity: 0;
    transition: opacity 0.6s ease;
}

.envelope-body {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('sobre.png') no-repeat center center;
    background-size: 100% 100%;
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    z-index: 1;
}

.flap-left, .flap-right {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: url('sobre.png') no-repeat;
    background-size: 200% 100%;
    transition: 1.5s cubic-bezier(0.4, 0.2, 0.2, 1), opacity 0.8s ease;
    z-index: 3;
}
.flap-left {
    left: 0;
    background-position: left;
    transform-origin: 22% center;
}
.flap-right {
    right: 0;
    background-position: right;
    transform-origin: 78% center;
}

.envelope.open .flap-left {
    transform: rotateY(100deg);
    opacity: 0;
}
.envelope.open .flap-right {
    transform: rotateY(-100deg);
    opacity: 0;
}
.envelope.open .envelope-body { opacity: 0; }
.envelope.open .envelope-back { opacity: 1; }

/* ===== SELLO ===== */
.seal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    cursor: pointer;
    z-index: 20;
}

/* ★ CLAVE: la imagen NO intercepta eventos */
.seal img {
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
}

.seal:hover {
    transform: translate(-50%, -50%) scale(1.08);
}

.seal:active {
    transform: translate(-50%, -50%) scale(0.95);
}

/* ===== HINT ===== */
.hint {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color: #ffd700;
    text-shadow: 0 0 20px #ffd700;
    animation: respirarGlow 2s infinite;
    pointer-events: none;
}
@keyframes respirarGlow {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
}

/* ===== EFECTOS ===== */
.fade-dust {
    animation: fadeOnly 1.5s forwards !important;
}
@keyframes fadeOnly {
    100% { opacity: 0; filter: blur(10px); visibility: hidden; }
}

/* ===== CARTA ===== */
.letter {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.3);
    width: 85%; max-width: 650px;
    background: url('sobre_back.png') no-repeat center center;
    background-size: contain;
    opacity: 0;
    transition: 0.8s;
    z-index: 10000;
}
.letter.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.letter.hide { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }

#texto {
    padding: 40px;
    text-align: center;
    font-size: 32px;
}

/* ===== MAIN ===== */
.main {
    opacity: 0;
    transition: 2s;
    padding: 0 12%;
    overflow-y: auto;
    height: 100vh;
}
.main.show { opacity: 1; }

/* ===== SECCIONES ===== */
.seccion {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.titulo {
    font-size: 75px;
    color: #c59b2a;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .titulo { font-size: 52px; }
}
</style>
</head>

<body>

<div class="bg">
    <img src="fondo.jpg" id="bg1" class="active">
    <img src="fondo2.jpg" id="bg2">
</div>

<div class="intro" id="intro">
    <div class="envelope" id="sobre">
        <div class="envelope-back"></div>
        <div class="envelope-body"></div>
        <div class="flap-left"></div>
        <div class="flap-right"></div>

        <div class="seal" id="sello">
            <img src="sello.png">
        </div>

        <div class="hint" id="hint">✨ Presiona el sello ✨</div>
    </div>
</div>

<div class="letter" id="carta">
    <div id="texto"></div>
</div>

<div class="main" id="main">
    <div class="seccion">
        <div>
            <h1 class="titulo">Ivon & Julio</h1>
            <p>💍 14 de agosto, 2026 💍</p>
        </div>
    </div>
</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>
// ===== CLICK CORREGIDO DEFINITIVO =====
const sello = document.getElementById("sello");

let yaAbierto = false;

sello.addEventListener("pointerup", function(e) {

    if (yaAbierto) return;

    const rect = sello.getBoundingClientRect();

    const centroX = rect.left + rect.width / 2;
    const centroY = rect.top + rect.height / 2;

    const dx = e.clientX - centroX;
    const dy = e.clientY - centroY;

    const distancia = Math.sqrt(dx * dx + dy * dy);

    const RADIO = rect.width * 0.28; // ajustado estable

    if (distancia <= RADIO) {
        yaAbierto = true;
        abrirSobre();
    }
});

// ===== TU LÓGICA ORIGINAL =====
function abrirSobre() {

    let sello = document.getElementById("sello");
    let hint = document.getElementById("hint");
    let sobre = document.getElementById("sobre");
    let carta = document.getElementById("carta");

    sello.classList.add("fade-dust");
    hint.classList.add("fade-dust");

    setTimeout(() => {
        sobre.classList.add("open");
    }, 1000);

    setTimeout(() => {
        carta.classList.add("show");
    }, 3000);

    setTimeout(() => {
        carta.classList.add("hide");

        setTimeout(() => {
            document.getElementById("intro").style.display = "none";
            document.getElementById("main").classList.add("show");
            document.body.style.overflow = "auto";
        }, 600);
    }, 5000);
}

document.body.style.overflow = "hidden";
</script>

</body>
</html>
