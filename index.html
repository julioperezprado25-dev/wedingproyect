<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* 🔒 MISMA CONFIG ORIGINAL */
html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
font-family:'Cinzel',serif;
background:
linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
url('papel.jpg');
background-size:350px;
}

/* ===== INTRO (NO TOCADA) ===== */
.intro{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
background:#000;
}

.envelope{
position:relative;
width:320px;
height:200px;
perspective:1200px;
}

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(145deg, rgba(232,211,165,0.9), rgba(201,176,122,0.9)),
url('papel.jpg');
background-size:cover;
border-radius:8px;
box-shadow:inset 0 0 25px rgba(0,0,0,0.3),0 8px 20px rgba(0,0,0,0.5);
}

.flap-left,.flap-right{
position:absolute;
top:0;
width:50%;
height:100%;
background:
linear-gradient(145deg, rgba(217,194,146,0.9), rgba(184,154,96,0.9)),
url('papel.jpg');
background-size:cover;
transition:1.5s;
box-shadow:inset 0 0 20px rgba(0,0,0,0.3);
}

.flap-left{left:0; transform-origin:left;}
.flap-right{right:0; transform-origin:right;}

.envelope.open .flap-left{transform:rotateY(-100deg);}
.envelope.open .flap-right{transform:rotateY(100deg);}

/* SELLO ORIGINAL */
.seal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border-radius:50%;
background:radial-gradient(circle,#b30000,#5a0000);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:10;
}

.seal span{color:#fff;font-weight:bold;}

.hint{
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes';
font-size:26px;
color:#ffd700;
text-shadow:0 0 15px #ffd700;
animation:respirarGlow 2s infinite;
}

@keyframes respirarGlow{
0%{opacity:0.6;}
50%{opacity:1;}
100%{opacity:0.6;}
}

.fade-dust{animation:fadeDust 2s forwards;}
@keyframes fadeDust{to{opacity:0;filter:blur(6px);}}

/* CARTA ORIGINAL */
.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
width:85%;
max-width:600px;
padding:35px;
background:
linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.9)),
url('papel.jpg');
background-size:350px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
opacity:0;
transition:2s;
font-family:'Great Vibes';
font-size:30px;
text-align:center;
z-index:10000;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}
.letter.hide{opacity:0;}

/* ===== MAIN PREMIUM ===== */
.main{
opacity:0;
transition:2s;
height:100vh;
overflow-y:auto;
scroll-snap-type:y mandatory;
}
.main.show{opacity:1;}

.section{
height:100vh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
text-align:center;
padding:20px;
}

/* CONTENIDO */
.content{
opacity:0;
transform:translateY(50px);
transition:1s;
}
.section.activa .content{
opacity:1;
transform:translateY(0);
}

/* FLORES MARCO */
.flor{
position:absolute;
width:clamp(50px,6vw,80px);
opacity:0;
transition:1s;
}

.section.activa .flor{opacity:1;}

.tl{top:10px; left:10px;}
.tr{top:10px; right:10px;}
.bl{bottom:10px; left:10px;}
.br{bottom:10px; right:10px;}

.flor img{width:100%;}

/* TITULO */
.titulo{
font-family:'Great Vibes';
font-size:60px;
color:#c59b2a;
}

/* BOTONES */
.btn{
padding:10px 18px;
background:#2e7d32;
color:#fff;
border-radius:20px;
margin:5px;
cursor:pointer;
}

/* BOTON AUDIO FLOTANTE */
.audio-btn{
position:fixed;
bottom:20px;
right:20px;
background:#7f0000;
color:#fff;
padding:12px;
border-radius:50%;
cursor:pointer;
z-index:999;
}
</style>
</head>

<body>

<!-- INTRO ORIGINAL -->
<div class="intro" id="intro">
<div class="envelope" id="sobre">
<div class="envelope-body"></div>
<div class="flap-left"></div>
<div class="flap-right"></div>

<div class="seal" id="sello" onclick="abrirSobre()">
<span>IJ</span>
</div>

<div class="hint" id="hint">Presiona el sello</div>
</div>
</div>

<div class="letter" id="carta">
Travesura realizada...<br><br>
¡Nos casamos! 💍
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="section">
<div class="flor tl"><img src="flores_izquierdaU.png"></div>
<div class="flor tr"><img src="flores_derechaC.png"></div>
<div class="flor bl"><img src="flores_izquierdaD.png"></div>
<div class="flor br"><img src="flores_derechaC.png"></div>
<div class="content"><h1>Imagen de Canijos</h1></div>
</div>

<div class="section">
<div class="flor tl"><img src="flores_izquierdaU.png"></div>
<div class="flor tr"><img src="flores_derechaC.png"></div>
<div class="flor bl"><img src="flores_izquierdaD.png"></div>
<div class="flor br"><img src="flores_derechaC.png"></div>
<div class="content">
<h1 class="titulo">Ivon & Julio</h1>
<p>Nos llena de alegría invitarte 💍</p>
</div>
</div>

<div class="section">
<div class="flor tl"><img src="flores_izquierdaU.png"></div>
<div class="flor tr"><img src="flores_derechaC.png"></div>
<div class="flor bl"><img src="flores_izquierdaD.png"></div>
<div class="flor br"><img src="flores_derechaC.png"></div>
<div class="content"><h2>Primera Información</h2></div>
</div>

</div>

<!-- AUDIO -->
<div class="audio-btn" onclick="toggleAudio()">🔇</div>
<audio id="musica" src="musica.mp3" loop></audio>

<script>

/* 🔒 MISMA LOGICA ORIGINAL FUNCIONAL */
function abrirSobre(){
let sello=document.getElementById("sello");
let hint=document.getElementById("hint");
let sobre=document.getElementById("sobre");
let carta=document.getElementById("carta");

sello.classList.add("fade-dust");
hint.classList.add("fade-dust");

setTimeout(()=>{
sobre.classList.add("open");
carta.classList.add("show");
},1800);

setTimeout(()=>{
carta.classList.add("hide");
},6500);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
document.body.style.overflow="auto";
activarScroll();
},8000);
}

function activarScroll(){
const sections=document.querySelectorAll(".section");
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting) e.target.classList.add("activa");
});
},{threshold:0.6});
sections.forEach(s=>obs.observe(s));
}

function toggleAudio(){
let audio=document.getElementById("musica");
audio.muted=!audio.muted;
}
</script>

</body>
</html>
