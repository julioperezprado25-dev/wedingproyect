<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{color:#fff;overflow-x:hidden;}

/* VIDEO */
.bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:-3;
}

.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.5);z-index:-2;
}

/* LATERALES */
body::before, body::after{
content:"";position:fixed;top:0;width:15px;height:100%;
z-index:-1;
}
body::before{left:0;background:#2e7d32;}
body::after{right:0;background:#ad5b73;}

/* SOBRE */
.intro{
position:fixed;width:100%;height:100%;
background:linear-gradient(135deg,#f5c6d6,#a5d6a7);
display:flex;justify-content:center;align-items:center;
z-index:999;
}

.sobre{
width:320px;height:220px;
background:#fff;
position:relative;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.tapa{
position:absolute;
width:100%;height:100%;
background:#ad5b73;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
z-index:2;
}

.carta{
position:absolute;
width:100%;height:100%;
background:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
z-index:1;
}

.sobre.abierto .tapa{
transform:rotateX(180deg);
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#2e7d32;
color:#fff;
}

/* SECCIONES */
section{
padding:80px 20px;
text-align:center;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
margin:20px;
border-radius:20px;
}

/* GALERÍA */
.modal{
display:none;
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
z-index:999;
}

.modal-content{
background:#fff;
color:#000;
padding:20px;
margin:50px auto;
max-width:500px;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.grid img{width:100%;border-radius:10px;}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay"></div>

<!-- SOBRE -->
<div id="intro" class="intro">
<div class="sobre" onclick="abrirSobre()">
<div class="tapa"></div>

<div class="carta">
<h3 id="nombreInvitado">Invitado</h3>
<p>Has sido invitado a la boda de</p>
<b>Ivon & Julio</b>
<small>Presiona para abrir</small>
</div>

</div>
</div>

<!-- CONTENIDO -->
<section>
<h1>Ivon & Julio</h1>
<p>14 Agosto 2026 · 8:30 PM</p>
</section>

<section>
<h2>Fotos</h2>
<button onclick="abrirGaleria()">Abrir</button>
</section>

<div id="galeria" class="modal">
<div class="modal-content">
<h2>Galería</h2>
<div id="gridFotos" class="grid"></div>

<input id="nombreFoto" placeholder="Nombre">
<input type="file" id="foto">

<button onclick="subirFoto()">Subir</button>
<button onclick="cerrarGaleria()">Cerrar</button>
</div>
</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>

/* INVITADO DINÁMICO */
const params=new URLSearchParams(window.location.search);
const nombre=params.get("nombre");

if(nombre){
document.getElementById("nombreInvitado").innerText=decodeURIComponent(nombre);
}

/* ABRIR SOBRE */
function abrirSobre(){
let sobre=document.querySelector(".sobre");
sobre.classList.add("abierto");

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("musica").play();
},1000);
}

/* FIREBASE */
const firebaseConfig={
apiKey:"TU_API_KEY",
authDomain:"TU.firebaseapp.com",
projectId:"TU",
storageBucket:"TU.appspot.com",
appId:"XXXX"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const storage=firebase.storage();

/* GALERÍA */
function abrirGaleria(){
document.getElementById("galeria").style.display="block";
cargarFotos();
}

function cerrarGaleria(){
document.getElementById("galeria").style.display="none";
}

async function subirFoto(){
let file=document.getElementById("foto").files[0];
if(!file) return alert("Selecciona archivo");

let ref=storage.ref("fotos/"+Date.now()+".jpg");
ref.put(file).then(()=>alert("Subida"));
}

function cargarFotos(){
db.collection("fotos").get().then(snap=>{
gridFotos.innerHTML="";
snap.forEach(doc=>{
storage.ref("fotos/"+doc.data().nombre)
.getDownloadURL().then(url=>{
let img=document.createElement("img");
img.src=url;
gridFotos.appendChild(img);
});
});
});
}

</script>

</body>
</html>
