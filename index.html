<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden;}

/* VIDEO */
.bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:-3;
}
.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.4);z-index:-2;
}

/* INTRO */
.intro{
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* SOBRE REALISTA */
.envelope{
position:relative;
width:340px;
height:240px;
cursor:pointer;
perspective:1000px;
}

/* base */
.envelope-body{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#f5c6d6,#e8a0bd);
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
z-index:1;
}

/* solapa real */
.envelope-flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:linear-gradient(145deg,#e48fb1,#d97aa0);
border-top-left-radius:10px;
border-top-right-radius:10px;
transform-origin:top;
transition:1s ease;
z-index:2;

/* forma curva */
clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
}

/* sombra interior */
.envelope::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), transparent 40%);
border-radius:10px;
z-index:2;
pointer-events:none;
}

.envelope.open .envelope-flap{
transform:rotateX(160deg);
}

.envelope.drop{
transform:translateY(600px);
transition:2s ease;
}

/* CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
width:80vw;
max-width:700px;
padding:50px;
border-radius:8px;

font-family:'Great Vibes',cursive;
font-size:30px;
text-align:center;
color:#2b2b2b;

/* papel antiguo */
background:
linear-gradient(#f4e4c1,#ecd8a6),
repeating-linear-gradient(
0deg,
rgba(0,0,0,0.03) 0px,
rgba(0,0,0,0.03) 1px,
transparent 1px,
transparent 3px
);

box-shadow:
0 25px 60px rgba(0,0,0,0.5),
inset 0 0 30px rgba(0,0,0,0.1);

transform:translate(-50%, -50%) scale(0.2) rotateX(60deg);
opacity:0;
z-index:10000;

transition:all 2s ease;
}

.letter.show{
opacity:1;
transform:translate(-50%, -50%) scale(1) rotateX(0deg);
}

.letter.expand{
transform:translate(-50%, -50%) scale(1.4);
}

/* fade */
.letter.fade{
opacity:0;
transition:3s ease;
}

/* TEXTO TINTA */
#texto span{
opacity:0;
filter:blur(6px);
transition:all 0.6s ease;
display:inline-block;
}

#texto span.show{
opacity:1;
filter:blur(0);
}

/* SECCIONES */
section{
padding:80px 20px;
text-align:center;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(12px);
margin:20px;
border-radius:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:10px;
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay"></div>

<!-- INTRO -->
<div id="intro" class="intro">
<div class="envelope" onclick="abrirSobre()">
<div class="envelope-flap"></div>
<div class="envelope-body"></div>
</div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div>
</div>

<!-- CONTENIDO -->
<section>
<h1>Ivon & Julio</h1>
<p>14 Agosto 2026 · 8:30 PM</p>
</section>

<section>
<h2>Detalles del Evento</h2>

<p>
La misa se celebrará a las 7:00 PM<br>
Parroquia San José – Jesús María<br><br>

La recepción se realizará en:<br>
(Ver ubicación abajo)<br><br>

Llegar temprano<br>
Llevar abrigo
</p>

<button onclick="window.open('https://maps.app.goo.gl/wC8v6kQmJdUNZViA6','_blank')">
📍 Google Maps
</button>

<button onclick="window.open('https://ul.waze.com/ul?navigate=yes','_blank')">
🚗 Waze
</button>

</section>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

const mensaje = `Ivon & Julio

Con mucho amor queremos invitarte
a compartir uno de los días más importantes
de nuestras vidas 💍

Tu presencia hará este momento aún más especial`;

function efectoTinta(){
let cont = document.getElementById("texto");
cont.innerHTML = "";

[...mensaje].forEach((letra,i)=>{
let span = document.createElement("span");
span.innerHTML = letra === "\n" ? "<br>" : letra;
cont.appendChild(span);

setTimeout(()=>{
span.classList.add("show");
}, i * 40);
});
}

function abrirSobre(){

let env=document.querySelector(".envelope");
let carta=document.getElementById("carta");

/* abrir */
env.classList.add("open");

/* bajar + mostrar carta */
setTimeout(()=>{
env.classList.add("drop");
carta.classList.add("show");
},1000);

/* expandir + tinta */
setTimeout(()=>{
carta.classList.add("expand");
efectoTinta();
},2000);

/* fade */
setTimeout(()=>{
carta.classList.add("fade");
},10000);

/* mostrar web */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("musica").play().catch(()=>{});
},13000);

}

</script>

</body>
</html>
