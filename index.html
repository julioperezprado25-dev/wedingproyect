<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
color:#2b2b2b;
overflow-x:hidden;

background:
url('https://www.transparenttextures.com/patterns/paper-fibers.png'),
#f5e6c8;
}

/* PARTÍCULAS */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:5;
}

/* IMÁGENES FLOTANTES */
.bg-float{
position:fixed;
width:260px;
opacity:0;
z-index:-1;
transition:8s ease;
}

/* INTRO */
.intro{
position:fixed;
width:100vw;height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* SOBRE */
.envelope{
position:relative;
width:360px;
height:250px;
perspective:1000px;
}

.envelope-body{
background:linear-gradient(145deg,#f0d28a,#d9b36a);
width:100%;
height:100%;
border-radius:10px;
}

.envelope-flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:#e0b96e;
clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
transform-origin:top;
transition:1s;
}

.envelope.open .envelope-flap{
transform:rotateX(180deg);
}

/* CARTA SALIENDO */
.letter{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%) translateY(100%);
width:90%;
max-width:600px;
padding:30px;
border-radius:10px;

background:
url('https://www.transparenttextures.com/patterns/paper-fibers.png'),
#f4e4c1;

font-family:'Great Vibes';
font-size:26px;
text-align:center;
opacity:0;
transition:2.5s;
z-index:10000;
}

.letter.show{
transform:translateX(-50%) translateY(-50%);
opacity:1;
}

/* TEXTO POLVO */
#texto span{
opacity:0;
filter:blur(10px);
animation:rebuild 1.4s forwards;
}

@keyframes rebuild{
0%{opacity:0;filter:blur(15px);}
100%{opacity:1;filter:blur(0);}
}

/* HERO */
.main{
opacity:0;
transition:2s;
}

.main.show{opacity:1;}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero-content h1{
font-family:'Great Vibes';
font-size:55px;
}

/* ICONO */
.icon{
width:90px;
margin:20px auto;
animation:flotar 4s ease-in-out infinite;
}

@keyframes flotar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

/* SECCIONES */
section{
padding:60px;
margin:20px;
border-radius:20px;
background:
url('https://www.transparenttextures.com/patterns/paper-fibers.png'),
rgba(255,255,255,0.6);
backdrop-filter:blur(4px);
}

/* BOTÓN */
.btn{
padding:12px 20px;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:10px;
display:inline-block;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<img src="fondo.jpg" class="bg-float" id="bg1">
<img src="fondo.jpg" class="bg-float" id="bg2">
<img src="fondo.jpg" class="bg-float" id="bg3">

<div class="intro" id="intro">
<div class="envelope">
<div class="envelope-body"></div>
<div class="envelope-flap"></div>
<div class="seal" onclick="abrirSobre()" style="position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);background:#7f0000;color:#fff;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">IJ</div>
</div>
</div>

<div class="letter" id="carta">
<div id="texto"></div>
</div>

<div class="main" id="main">

<div class="hero">
<div class="hero-content">

<h1>Ivon & Julio</h1>
<img src="icon.png" class="icon">

<p>Nos llena de alegría invitarte a nuestro gran día 💍</p>

</div>
</div>

<section>
<h2>Detalles del Evento</h2>
<a class="btn" onclick="abrirMaps()">📍 Google Maps</a>
<a class="btn" onclick="abrirWaze()">🚗 Waze</a>
</section>

</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

/* MENSAJE */
const mensaje=`¡Nos casamos!

Queremos compartir este momento único contigo.

Tu presencia hará este día inolvidable 💍`;

/* TEXTO POLVO */
function efectoPolvo(){
let cont=document.getElementById("texto");
cont.innerHTML="";

[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
s.style.animationDelay=(i*0.04)+"s";
cont.appendChild(s);
});
}

/* SOBRE */
function abrirSobre(){
let env=document.querySelector(".envelope");
let carta=document.getElementById("carta");

env.classList.add("open");

setTimeout(()=>{
carta.classList.add("show");
efectoPolvo();
fadeInAudio();
},2000);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
animarFondos();
},8000);
}

/* AUDIO FADE */
function fadeInAudio(){
let audio=document.getElementById("musica");
audio.volume=0;
audio.play().catch(()=>{});

let v=0;
let interval=setInterval(()=>{
v+=0.05;
audio.volume=v;
if(v>=1) clearInterval(interval);
},300);
}

/* FONDOS */
function animarFondos(){
let imgs=[bg1,bg2,bg3];

setInterval(()=>{
let img=imgs[Math.floor(Math.random()*imgs.length)];

img.style.left=Math.random()*70+"%";
img.style.top=Math.random()*70+"%";
img.style.opacity=0.25;

setTimeout(()=>img.style.opacity=0,6000);

},7000);
}

/* PARTÍCULAS */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.3)";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;
});

requestAnimationFrame(draw);
}

draw();

/* MAPS */
function abrirMaps(){
window.open("https://www.google.com/maps","_blank");
}
function abrirWaze(){
window.open("https://waze.com","_blank");
}

</script>

</body>
</html>
