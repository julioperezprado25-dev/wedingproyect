<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Cinzel',serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* ===== INTRO ===== */
.intro{
position:fixed;
width:100vw;height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:9999;
}

/* SOBRE */
.envelope{
position:relative;
width:320px;
height:200px;
perspective:1200px;
}

/* CUERPO */
.envelope-body{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#e8d3a5,#c9b07a);
border-radius:8px;
}

/* TAPAS */
.flap-left, .flap-right{
position:absolute;
top:0;
width:50%;
height:100%;
background:linear-gradient(145deg,#e8d3a5,#c9b07a);
transition:1.5s ease-in-out;
}

.flap-left{left:0; transform-origin:left;}
.flap-right{right:0; transform-origin:right;}

.envelope.open .flap-left{
transform:rotateY(-100deg);
}

.envelope.open .flap-right{
transform:rotateY(100deg);
}

/* SELLO */
.seal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
background:radial-gradient(circle at 30% 30%,#a00000,#5a0000);
border-radius:50%;
box-shadow:0 6px 12px rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
font-family:'Cinzel';
}

/* DESINTEGRACIÓN (SIN MOVIMIENTO) */
.fade-dust{
animation:desintegrar 2s forwards;
}

@keyframes desintegrar{
0%{opacity:1;filter:blur(0);}
100%{opacity:0;filter:blur(8px);}
}

/* TEXTO INFERIOR */
.hint{
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes';
font-size:26px;
animation:respirar 2s infinite;
}

.hint.fade{
animation:desintegrar 2s forwards;
}

@keyframes respirar{
0%{opacity:0.5;}
50%{opacity:1;}
100%{opacity:0.5;}
}

/* CARTA */
.letter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
width:85%;
max-width:600px;
padding:30px;
border-radius:10px;
opacity:0;
transition:1.5s ease;

background:linear-gradient(#f5e6c8,#e8d3a5);

font-family:'Great Vibes';
font-size:28px;
color:#3b2a1a;
text-align:center;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
  }


/* TEXTO EFECTO */
#texto span{
opacity:0;
filter:blur(8px);
animation:aparecer 1s forwards;
}

@keyframes aparecer{
to{
opacity:1;
filter:blur(0);
}
}

/* ===== RESTO ===== */
.main{display:none;}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="envelope" id="sobre">

    <div class="envelope-body"></div>

    <div class="flap-left"></div>
    <div class="flap-right"></div>

    <div class="seal" id="sello" onclick="abrirSobre()">IJ</div>

    <div class="hint" id="hint">Presiona el sello</div>

  </div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
  <div id="texto"></div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main" id="main">
<h1 style="text-align:center;margin-top:50px;">Ivon & Julio</h1>
</div>

<script>

const mensaje = `Travesura realizada...

¡Nos casamos!
Y has sido invitado a celebrar este momento con nosotros 💍`;

function efectoTexto(){
let cont=document.getElementById("texto");
cont.innerHTML="";

[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
s.style.opacity="0";
s.style.animation="aparecer 1s forwards";
s.style.animationDelay=(i*0.05)+"s";
cont.appendChild(s);
});
}

function abrirSobre(){

let sello=document.getElementById("sello");
let hint=document.getElementById("hint");
let sobre=document.getElementById("sobre");
let carta=document.getElementById("carta");

sello.classList.add("fade-dust");
hint.classList.add("fade");

/* ABRIR SOBRE */
setTimeout(()=>{
sobre.classList.add("open");

/* CARTA APARECE INMEDIATO */
carta.classList.add("show");
efectoTexto();

},1800);

/* TRANSICIÓN A WEB */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
},7000);

  }

</script>

</body>
</html>
