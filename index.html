I <!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ivon & Julio</title><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
color:#2b2b2b;
overflow-x:hidden;

background:
url('papel.png'),
linear-gradient(#f5e6c8,#f2ddb5);

background-size:300px,cover;
}

/* ===== 🌿 CONTENEDORES ===== */
.flor-box{
position:fixed;
width:220px;
z-index:2;
pointer-events:none;
}

/* POSICIONES */
.top-left{top:0; left:0;}
.bottom-left{bottom:0; left:0;}
.top-right{top:0; right:0;}
.bottom-right{bottom:0; right:0;}

/* ESPEJO SOLO EN CONTENEDOR */
.mirror{
transform:scaleX(-1);
}

/* ===== 🌿 CAPA ANIMADA ===== */
.flor{
width:100%;
animation:viento 5s ease-in-out infinite;
transform-origin:center;
}

/* 🌬️ VIENTO REAL (NO BLOQUE) */
@keyframes viento{
0%{
transform:rotate(0deg) translateY(0px) skewX(0deg);
}
25%{
transform:rotate(0.6deg) translateY(3px) skewX(0.5deg);
}
50%{
transform:rotate(1.2deg) translateY(6px) skewX(1deg);
}
75%{
transform:rotate(0.6deg) translateY(3px) skewX(0.5deg);
}
100%{
transform:rotate(0deg) translateY(0px) skewX(0deg);
}
}

/* DESFASE NATURAL */
.delay1 .flor{animation-delay:0s;}
.delay2 .flor{animation-delay:1.2s;}
.delay3 .flor{animation-delay:2.4s;}
.delay4 .flor{animation-delay:3.6s;}

/* ===== FONDOS ===== */
.bg-container{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
z-index:-2;
pointer-events:none;
}

.bg-img{
position:absolute;
width:75%;
max-width:800px;
border-radius:20px;
opacity:0.12;
animation:respirar 14s infinite ease-in-out;
}

.bg2{animation-delay:7s;}

@keyframes respirar{
0%{opacity:0.08;transform:scale(0.95);}
50%{opacity:0.25;transform:scale(1);}
100%{opacity:0.08;transform:scale(0.95);}
}

/* ===== INTRO ===== */
.intro{
position:fixed;
width:100vw;height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:#fff;
}

/* SOBRE */
.envelope{
position:relative;
width:300px;
height:200px;
transition:1s;
}

.envelope-body{
background:linear-gradient(145deg,#f0d28a,#d9b36a);
width:100%;height:100%;
border-radius:10px;
}

.envelope-flap{
position:absolute;
top:0;
width:100%;
height:100px;
background:#e0b96e;
clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
transform-origin:top;
transition:1s;
}

.envelope.open .envelope-flap{
transform:rotateX(180deg);
}

/* SELLO */
.seal{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:70px;height:70px;
background:#7f0000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* TEXTO INFERIOR */
.hint{
position:absolute;
bottom:-35px;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes';
font-size:22px;
animation:brillo 1.5s infinite;
}

@keyframes brillo{
0%,100%{opacity:0.4;}
50%{opacity:1;}
}

/* ===== CARTA ===== */
.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.3);
width:90%;
max-width:600px;
padding:25px;
border-radius:10px;
opacity:0;
transition:2s;
z-index:10000;

background:
url('papel.png'),
#f4e4c1;

font-family:'Great Vibes';
font-size:24px;
text-align:center;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.letter.fade{opacity:0;}

/* TEXTO */
#texto span{
opacity:0;
filter:blur(10px);
animation:rebuild 1.2s forwards;
}

@keyframes rebuild{
to{
opacity:1;
filter:blur(0);
}
}

/* MAIN */
.main{
opacity:0;
transition:2s;
}
.main.show{opacity:1;}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* ICONO */
.icon{
width:70px;
margin:20px auto;
animation:flotar 4s infinite ease-in-out;
}

@keyframes flotar{
50%{transform:translateY(-10px);}
}

/* SECCIONES */
section{
padding:40px;
margin:15px;
border-radius:20px;
background:transparent;
}

/* BOTONES */
.btn{
padding:10px 18px;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:8px;
display:inline-block;
}

#galeria img{
width:120px;
margin:8px;
border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:480px){
.letter{font-size:20px;}
.envelope{width:260px;height:180px;}
.flor-box{width:140px;}
}
</style></head><body><!-- 🌿 ESQUINAS CORREGIDAS --><div class="flor-box top-left delay1">
  <img src="flores_lateral.svg" class="flor">
</div><div class="flor-box bottom-left delay2">
  <img src="flores_lateral.svg" class="flor">
</div><div class="flor-box top-right mirror delay3">
  <img src="flores_lateral.svg" class="flor">
</div><div class="flor-box bottom-right mirror delay4">
  <img src="flores_lateral.svg" class="flor">
</div><div class="bg-container">
<img src="fondo.jpg" class="bg-img">
<img src="fondo2.jpg" class="bg-img bg2">
</div><div class="intro" id="intro">
<div class="envelope" id="sobre"><div class="envelope-body"></div>
<div class="envelope-flap"></div><div class="seal" onclick="abrirSobre()">IJ</div><div class="hint">Presiona el sello</div></div>
</div><div class="letter" id="carta">
<div id="texto"></div>
</div><div class="main" id="main"><div class="hero">
<div>
<h1 style="font-family:'Great Vibes';font-size:50px;">Ivon & Julio</h1>
<img src="icon.png" class="icon">
<p>Nos llena de alegría invitarte a nuestro gran día 💍</p>
</div>
</div><section>
<h2>Detalles del Evento</h2>
<a class="btn" onclick="abrirMaps()">📍 Google Maps</a>
<a class="btn" onclick="abrirWaze()">🚗 Waze</a>
</section><section>
<h2>Álbum de Fotos</h2>
<input type="file" id="foto">
<button class="btn" onclick="subirFoto()">Subir</button>
<div id="galeria"></div>
</section><section>
<h2>Mensajes</h2>
<input id="nombre" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Mensaje"></textarea>
<button class="btn" onclick="enviarMensaje()">Enviar</button>
</section><section>
<h2>Regalos</h2>
<p>Tu presencia es nuestro mejor regalo 💛</p>
</section></div><audio id="musica" src="musica.mp3" loop></audio>

<script>
// SIN CAMBIOS
const mensaje=`¡Nos casamos!

Queremos compartir este momento contigo.

Tu presencia hará este día inolvidable 💍`;

function efectoPolvo(){
let cont=document.getElementById("texto");
cont.innerHTML="";
[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
s.style.animationDelay=(i*0.04)+"s";
cont.appendChild(s);
});
}

function abrirSobre(){
let sobre=document.getElementById("sobre");
let carta=document.getElementById("carta");

sobre.classList.add("open");

setTimeout(()=>{
carta.classList.add("show");
efectoPolvo();
fadeInAudio();
},1800);

setTimeout(()=>{
sobre.style.transform="translateY(500px)";
sobre.style.opacity="0";
},2500);

setTimeout(()=>{
carta.classList.add("fade");
},8500);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
},9500);
}

function fadeInAudio(){
let audio=document.getElementById("musica");
audio.volume=0;
audio.play().catch(()=>{});
let v=0;
let i=setInterval(()=>{
v+=0.05;
audio.volume=v;
if(v>=1) clearInterval(i);
},300);
}

function abrirMaps(){window.open("https://maps.app.goo.gl/Q1ZZW4iSjFKcPpRN9");}
function abrirWaze(){window.open("https://waze.com/ul/h6mc5mgy3k");}

function subirFoto(){
let file=document.getElementById("foto").files[0];
if(!file)return;
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
document.getElementById("galeria").appendChild(img);
}

function enviarMensaje(){
alert("Mensaje enviado 💌");
}
</script></body>
</html>
