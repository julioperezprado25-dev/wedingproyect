<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Cinzel',serif;
color:#2b2b2b;
overflow-x:hidden;
background:linear-gradient(#f5e6c8,#f2ddb5);
}

/* ===== 🌿 FLORES ===== */
.flor-box{
position:fixed;
width:160px;
z-index:2;
pointer-events:none;
}
.top-left{top:0; left:0;}
.bottom-left{bottom:0; left:0;}
.right-center{top:50%; right:0; transform:translateY(-50%);}

.flor{
width:100%;
animation:respirarFlor 6s infinite ease-in-out;
}

@keyframes respirarFlor{
0%{transform:scale(0.95);}
50%{transform:scale(1);}
100%{transform:scale(0.95);}
}

/* ===== INTRO ===== */
.intro{
position:fixed;
width:100vw;height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:9999;
}

/* SOBRE */
.envelope{
position:relative;
width:320px;
height:200px;
perspective:1200px;
}

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#e8d3a5,#c9b07a);
border-radius:8px;
}

.flap-left, .flap-right{
position:absolute;
top:0;
width:50%;
height:100%;
background:linear-gradient(145deg,#e8d3a5,#c9b07a);
transition:1.5s ease-in-out;
}

.flap-left{left:0; transform-origin:left;}
.flap-right{right:0; transform-origin:right;}

.envelope.open .flap-left{transform:rotateY(-100deg);}
.envelope.open .flap-right{transform:rotateY(100deg);}

/* SELLO */
.seal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;height:80px;
background:radial-gradient(circle at 30% 30%,#a00000,#5a0000);
border-radius:50%;
box-shadow:0 6px 12px rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
}

/* DESINTEGRACIÓN */
.fade-dust{
animation:desintegrar 2s forwards;
}

@keyframes desintegrar{
to{opacity:0;filter:blur(8px);}
}

/* TEXTO */
.hint{
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes';
font-size:26px;
animation:respirar 2s infinite;
}
.hint.fade{animation:desintegrar 2s forwards;}

@keyframes respirar{
0%{opacity:0.5;}
50%{opacity:1;}
100%{opacity:0.5;}
}

/* CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
width:85%;
max-width:600px;
padding:30px;
border-radius:10px;
opacity:0;
transition:1.5s ease;

background:linear-gradient(#f5e6c8,#e8d3a5);

font-family:'Great Vibes';
font-size:28px;
text-align:center;
z-index:10000;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

/* TEXTO EFECTO */
#texto span{
opacity:0;
filter:blur(8px);
animation:aparecer 1s forwards;
}

@keyframes aparecer{
to{opacity:1;filter:blur(0);}
}

/* MAIN */
.main{
opacity:0;
transition:2s;
}
.main.show{opacity:1;}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.titulo{
font-family:'Great Vibes';
font-size:60px;
color:#8b0000;
}

/* BOTONES */
.btn{
padding:10px 18px;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:8px;
display:inline-block;
}

/* AUDIO */
.btn-audio{background:#7f0000;}

section{
padding:40px;
margin:15px;
text-align:center;
}

/* RESPONSIVE */
@media(max-width:480px){
.flor-box{width:110px;}
.titulo{font-size:40px;}
}
</style>
</head>

<body>

<!-- 🌿 FLORES -->
<div class="flor-box top-left">
<img src="flores_izquierdaU.png" class="flor">
</div>

<div class="flor-box bottom-left">
<img src="flores_izquierdaD.png" class="flor">
</div>

<div class="flor-box right-center">
<img src="flores_derechaC.png" class="flor">
</div>

<!-- INTRO -->
<div class="intro" id="intro">
<div class="envelope" id="sobre">

<div class="envelope-body"></div>
<div class="flap-left"></div>
<div class="flap-right"></div>

<div class="seal" id="sello" onclick="abrirSobre()">IJ</div>
<div class="hint" id="hint">Presiona el sello</div>

</div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div>
</div>

<!-- WEB -->
<div class="main" id="main">

<div class="hero">
<div>
<h1 class="titulo">Ivon & Julio</h1>
<p>Nos llena de alegría invitarte a nuestro gran día 💍</p>
</div>
</div>

<section>
<h2>Detalles del Evento</h2>

<p>25 de Diciembre - 6:00 PM</p>

<a class="btn" onclick="abrirMaps()">📍 Google Maps</a>
<a class="btn" onclick="abrirWaze()">🚗 Waze</a>
</section>

<section>
<button class="btn btn-audio" onclick="toggleAudio()">🔇 Música</button>
</section>

</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>
const mensaje=`Travesura realizada...

¡Nos casamos!
Y has sido invitado a celebrar este momento con nosotros 💍`;

function efectoTexto(){
let cont=document.getElementById("texto");
cont.innerHTML="";
[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
s.style.animationDelay=(i*0.05)+"s";
cont.appendChild(s);
});
}

function abrirSobre(){

let sello=document.getElementById("sello");
let hint=document.getElementById("hint");
let sobre=document.getElementById("sobre");
let carta=document.getElementById("carta");

sello.classList.add("fade-dust");
hint.classList.add("fade");

setTimeout(()=>{
sobre.classList.add("open");
carta.classList.add("show");
efectoTexto();
fadeInAudio();
},1800);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
},7000);

}

function fadeInAudio(){
let audio=document.getElementById("musica");
audio.volume=0;
audio.play().catch(()=>{});
let v=0;
let i=setInterval(()=>{
v+=0.05;
audio.volume=v;
if(v>=1) clearInterval(i);
},300);
}

function toggleAudio(){
let audio=document.getElementById("musica");
audio.muted=!audio.muted;
}

function abrirMaps(){
window.open("https://maps.app.goo.gl/Q1ZZW4iSjFKcPpRN9");
}

function abrirWaze(){
window.open("https://waze.com/ul/h6mc5mgy3k");
}
</script>

</body>
</html>
