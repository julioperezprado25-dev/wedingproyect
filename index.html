<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
color:#2b2b2b;
overflow-x:hidden;

/* PAPEL BASE */
background:
url('papel.png'),
linear-gradient(#f5e6c8,#f2ddb5);

/* ===== IMÁGENES DE FONDO ===== */
.bg-img{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
opacity:0.15;
animation:respirar 12s infinite ease-in-out;
pointer-events:none;
}

.bg2{
z-index:-3;
animation-delay:6s;
}

@keyframes respirar{
0%{
opacity:0.1;
filter:brightness(0.8) blur(1px);
}
50%{
opacity:0.35;
filter:brightness(1.1) blur(0px);
}
100%{
opacity:0.1;
filter:brightness(0.8) blur(1px);
}
}

/* ===== INTRO ===== */
.intro{
position:fixed;
width:100vw;height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* SOBRE */
.envelope{
position:relative;
width:360px;
height:250px;
transition:1s;
}

.envelope-body{
background:linear-gradient(145deg,#f0d28a,#d9b36a);
width:100%;height:100%;
border-radius:10px;
}

.envelope-flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:#e0b96e;
clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
transform-origin:top;
transition:1s;
}

.envelope.open .envelope-flap{
transform:rotateX(180deg);
}

/* CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.3);
width:90%;
max-width:600px;
padding:30px;
border-radius:10px;
opacity:0;
transition:2.5s;
z-index:10000;

background:
url('papel.png'),
#f4e4c1;

font-family:'Great Vibes';
font-size:26px;
text-align:center;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.letter.fade{opacity:0;}

/* TEXTO POLVO */
#texto span{
opacity:0;
filter:blur(10px);
animation:rebuild 1.4s forwards;
}

@keyframes rebuild{
0%{opacity:0;filter:blur(15px);}
100%{opacity:1;filter:blur(0);}
}

/* MAIN */
.main{
opacity:0;
transition:2s;
}
.main.show{opacity:1;}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* ICONO */
.icon{
width:90px;
margin:20px auto;
display:block;
animation:flotar 4s ease-in-out infinite;
}

@keyframes flotar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* ===== SECCIONES TRANSLÚCIDAS ===== */
section{
padding:60px;
margin:20px;
border-radius:20px;

/* GLASS EFECTO */
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.4);
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* BOTONES */
.btn{
padding:12px 20px;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:10px;
display:inline-block;
}

/* GALERIA */
#galeria img{
width:140px;
margin:10px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- FONDOS -->
<img src="fondo.jpg" class="bg-img">
<img src="fondo2.jpg" class="bg-img bg2">

<!-- INTRO -->
<div class="intro" id="intro">
<div class="envelope" id="sobre">
<div class="envelope-body"></div>
<div class="envelope-flap"></div>

<div onclick="abrirSobre()" 
style="position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);
background:#7f0000;color:#fff;width:70px;height:70px;border-radius:50%;
display:flex;align-items:center;justify-content:center;cursor:pointer;">
IJ
</div>

</div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div>
</div>

<!-- CONTENIDO -->
<div class="main" id="main">

<div class="hero">
<div>
<h1 style="font-family:'Great Vibes';font-size:55px;">Ivon & Julio</h1>

<img src="icon.png" class="icon">

<p>Nos llena de alegría invitarte a nuestro gran día 💍</p>
</div>
</div>

<section>
<h2>Detalles del Evento</h2>
<a class="btn" onclick="abrirMaps()">📍 Google Maps</a>
<a class="btn" onclick="abrirWaze()">🚗 Waze</a>
</section>

<section>
<h2>Álbum de Fotos</h2>
<input type="file" id="foto">
<button class="btn" onclick="subirFoto()">Subir</button>
<div id="galeria"></div>
</section>

<section>
<h2>Mensajes</h2>
<input id="nombre" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Mensaje"></textarea>
<button class="btn" onclick="enviarMensaje()">Enviar</button>
</section>

<section>
<h2>Regalos</h2>
<p>Tu presencia es nuestro mejor regalo 💛</p>
</section>

</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

/* MENSAJE */
const mensaje=`¡Nos casamos!

Queremos compartir este momento contigo.

Tu presencia hará este día inolvidable 💍`;

/* TEXTO */
function efectoPolvo(){
let cont=document.getElementById("texto");
cont.innerHTML="";

[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
s.style.animationDelay=(i*0.04)+"s";
cont.appendChild(s);
});
}

/* SOBRE */
function abrirSobre(){
let sobre=document.getElementById("sobre");
let carta=document.getElementById("carta");

sobre.classList.add("open");

setTimeout(()=>{
carta.classList.add("show");
efectoPolvo();
fadeInAudio();
},2000);

/* ESCONDER SOBRE */
setTimeout(()=>{
sobre.style.transform="translateY(600px) rotateX(20deg)";
},2500);

/* DESAPARECER CARTA */
setTimeout(()=>{
carta.classList.add("fade");
},9000);

/* MOSTRAR WEB */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
},10000);
}

/* AUDIO */
function fadeInAudio(){
let audio=document.getElementById("musica");
audio.volume=0;
audio.play().catch(()=>{});
let v=0;
let i=setInterval(()=>{
v+=0.05;
audio.volume=v;
if(v>=1) clearInterval(i);
},300);
}

/* MAPS */
function abrirMaps(){window.open("https://google.com/maps");}
function abrirWaze(){window.open("https://waze.com");}

/* FOTO */
function subirFoto(){
let file=document.getElementById("foto").files[0];
if(!file) return;
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
document.getElementById("galeria").appendChild(img);
}

/* MENSAJE */
function enviarMensaje(){
alert("Mensaje enviado 💌");
}

</script>

</body>
</html>
