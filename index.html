<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Cinzel',serif;
color:#2b2b2b;
overflow-x:hidden;
background:#000;
}

/* ===== 🌿 FLORES ===== */
.flor-box{
position:fixed;
width:140px;
z-index:3;
pointer-events:none;
}
.top-left{top:0; left:0;}
.bottom-left{bottom:0; left:0;}
.right-center{top:50%; right:0; transform:translateY(-50%);}

.flor{
width:100%;
animation:respirarFlor 6s infinite ease-in-out;
}

@keyframes respirarFlor{
50%{transform:scale(1.05);}
}

/* ===== 🌄 FONDO ===== */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.bg img{
position:absolute;
width:80%;
max-width:900px;
border-radius:20px;
opacity:0;
transition:2s;
}

.bg img.active{
opacity:0.25;
}

/* ===== INTRO ===== */
.intro{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;

/* FONDO COMPLETO SIN TRANSPARENCIA */
background:
radial-gradient(circle at center, rgba(255,215,0,0.08), transparent 60%),
linear-gradient(#0b0b1a, #000 80%);
}

/* SOBRE */
.envelope{
position:relative;
width:320px;
height:200px;
perspective:1200px;
}

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#e8d3a5,#c9b07a);
border-radius:8px;
box-shadow:inset 0 0 25px rgba(0,0,0,0.3),0 8px 20px rgba(0,0,0,0.5);
}

.flap-left,.flap-right{
position:absolute;
top:0;
width:50%;
height:100%;
background:linear-gradient(145deg,#d9c292,#b89a60);
transition:1.5s;
box-shadow:inset 0 0 20px rgba(0,0,0,0.3);
}

.flap-left{left:0; transform-origin:left;}
.flap-right{right:0; transform-origin:right;}

.envelope.open .flap-left{transform:rotateY(-100deg);}
.envelope.open .flap-right{transform:rotateY(100deg);}

/* SELLO */
.seal{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:80px;height:80px;
background:radial-gradient(circle,#b30000,#5a0000);
border-radius:50%;
box-shadow:
inset 0 3px 6px rgba(255,255,255,0.2),
inset 0 -4px 10px rgba(0,0,0,0.6),
0 6px 12px rgba(0,0,0,0.6);

display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.seal span{
pointer-events:none;
color:#fff;
font-weight:bold;
}

/* DESINTEGRACIÓN */
.fade-dust{animation:fadeDust 2s forwards;}
@keyframes fadeDust{to{opacity:0;filter:blur(6px);}}

/* TEXTO BRILLANTE + RESPIRACIÓN */
.hint{
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes';
font-size:26px;
color:#ffd700;

/* DESTELLO */
text-shadow:
0 0 8px #ffd700,
0 0 15px #ffcc00,
0 0 25px rgba(255,215,0,0.8);

/* RESPIRACIÓN */
animation:respirarGlow 2s infinite;
}

@keyframes respirarGlow{
0%{
opacity:0.6;
transform:translateX(-50%) scale(0.95);
text-shadow:0 0 5px #ffd700;
}
50%{
opacity:1;
transform:translateX(-50%) scale(1.05);
text-shadow:0 0 20px #ffd700,0 0 35px #ffcc00;
}
100%{
opacity:0.6;
transform:translateX(-50%) scale(0.95);
text-shadow:0 0 5px #ffd700;
}
}

.hint.fade{animation:fadeDust 2s forwards;}

/* CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
width:85%;
max-width:600px;
padding:35px;
background:linear-gradient(#f5e6c8,#e8d3a5);
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6),
inset 0 0 30px rgba(0,0,0,0.2);
opacity:0;
transition:2s;
font-family:'Great Vibes';
font-size:30px;
text-align:center;
z-index:10000;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.letter.hide{opacity:0;}

/* TEXTO */
#texto span{
opacity:0;
animation:aparecer 1s forwards;
}
@keyframes aparecer{to{opacity:1;}}

/* ===== MAIN ===== */
.main{
opacity:0;
transition:2s;
padding:0 12%;
}
.main.show{opacity:1;}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
}

.titulo{
font-family:'Great Vibes';
font-size:60px;
color:#ffd700;
}

section{
padding:40px;
margin:20px 0;
color:#fff;
text-align:center;
}

/* BOTONES */
.btn{
padding:10px 18px;
background:#2e7d32;
color:#fff;
border-radius:20px;
margin:5px;
cursor:pointer;
display:inline-block;
}

.btn-audio{background:#7f0000;}

#galeria img{
width:120px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- FONDO -->
<div class="bg">
<img src="fondo.jpg" id="bg1" class="active">
<img src="fondo2.jpg" id="bg2">
</div>

<!-- FLORES -->
<div class="flor-box top-left"><img src="flores_izquierdaU.png" class="flor"></div>
<div class="flor-box bottom-left"><img src="flores_izquierdaD.png" class="flor"></div>
<div class="flor-box right-center"><img src="flores_derechaC.png" class="flor"></div>

<!-- INTRO -->
<div class="intro" id="intro">
<div class="envelope" id="sobre">
<div class="envelope-body"></div>
<div class="flap-left"></div>
<div class="flap-right"></div>

<div class="seal" id="sello" onclick="abrirSobre()">
<span>IJ</span>
</div>

<div class="hint" id="hint">Presiona el sello</div>
</div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="hero">
<div>
<h1 class="titulo">Ivon & Julio</h1>
<p>Nos llena de alegría invitarte 💍</p>
</div>
</div>

<section>
<h2>Detalles del Evento</h2>
<a class="btn" onclick="abrirMaps()">📍 Maps</a>
<a class="btn" onclick="abrirWaze()">🚗 Waze</a>
</section>

<section>
<h2>Álbum de Fotos</h2>
<input type="file" id="foto">
<button class="btn" onclick="subirFoto()">Subir</button>
<div id="galeria"></div>
</section>

<section>
<h2>Mensajes</h2>
<input id="nombre" placeholder="Tu nombre"><br><br>
<textarea id="mensajeInput" placeholder="Mensaje"></textarea><br>
<button class="btn" onclick="enviarMensaje()">Enviar</button>
</section>

<section>
<button class="btn btn-audio" onclick="toggleAudio()">🔇 Música</button>
</section>

</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>
const mensaje=`Travesura realizada...

¡Nos casamos!
Y has sido invitado a celebrar este momento con nosotros 💍`;

function efectoTexto(){
let cont=document.getElementById("texto");
cont.innerHTML="";
[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
s.style.animationDelay=(i*0.05)+"s";
cont.appendChild(s);
});
}

function abrirSobre(){
let sello=document.getElementById("sello");
let hint=document.getElementById("hint");
let sobre=document.getElementById("sobre");
let carta=document.getElementById("carta");

sello.classList.add("fade-dust");
hint.classList.add("fade");

setTimeout(()=>{
sobre.classList.add("open");
carta.classList.add("show");
efectoTexto();
fadeInAudio();
},1800);

setTimeout(()=>{
carta.classList.add("hide");
},6500);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
iniciarFondo();
},8000);
}

function iniciarFondo(){
let b1=document.getElementById("bg1");
let b2=document.getElementById("bg2");
setInterval(()=>{
b1.classList.toggle("active");
b2.classList.toggle("active");
},6000);
}

function fadeInAudio(){
let audio=document.getElementById("musica");
audio.volume=0;
audio.play().catch(()=>{});
let v=0;
let i=setInterval(()=>{
v+=0.05;
audio.volume=v;
if(v>=1) clearInterval(i);
},300);
}

function toggleAudio(){
let audio=document.getElementById("musica");
audio.muted=!audio.muted;
}

function abrirMaps(){
window.open("https://maps.app.goo.gl/Q1ZZW4iSjFKcPpRN9");
}

function abrirWaze(){
window.open("https://waze.com/ul/h6mc5mgy3k");
}

function subirFoto(){
let file=document.getElementById("foto").files[0];
if(!file)return;
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
document.getElementById("galeria").appendChild(img);
}

function enviarMensaje(){
alert("Mensaje enviado 💌");
}
</script>

</body>
</html>
