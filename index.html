<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* VIDEO FONDO */
.bg-video{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
z-index:-3;
opacity:0;
transition:2s;
}
.bg-video.show{opacity:1;}

.overlay{
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.3);
z-index:-2;
opacity:0;
transition:2s;
pointer-events:none;
}
.overlay.show{opacity:1;}

/* INTRO */
.intro{
position:fixed;
width:100vw;height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

/* SOBRE */
.envelope{
position:relative;
width:300px;
height:200px;
cursor:pointer;
}

.envelope-back{
position:absolute;
width:100%;height:100%;
background:linear-gradient(145deg,#f5c6d6,#e8a0bd);
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.envelope-flap{
position:absolute;
top:0;
width:100%;
height:110px;
background:linear-gradient(145deg,#e48fb1,#d97aa0);
clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
transform-origin:top;
transition:1s;
z-index:2;
}

.envelope.open .envelope-flap{
transform:rotateX(170deg);
}

.envelope.drop{
transform:translateY(600px);
transition:2s;
}

.hint{
margin-top:20px;
font-family:'Great Vibes',cursive;
font-size:20px;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%,100%{opacity:0.5;}
50%{opacity:1;}
}

/* CARTA RESPONSIVE */
.letter{
position:fixed;
top:50%;
left:50%;
width:90%;
max-width:600px;
max-height:80vh;
overflow:auto;

padding:30px;
border-radius:8px;

font-family:'Great Vibes',cursive;
font-size:24px;
line-height:1.4;
text-align:center;
color:#2b2b2b;

background:linear-gradient(#f4e4c1,#ecd8a6);

box-shadow:0 25px 60px rgba(0,0,0,0.5);

transform:translate(-50%,-50%) scale(0.2);
opacity:0;
z-index:10000;

transition:2s;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.letter.expand{
transform:translate(-50%,-50%) scale(1.2);
}

.letter.fade{
opacity:0;
transition:3s;
}

/* TEXTO TINTA */
#texto span{
opacity:0;
filter:blur(5px);
transition:0.4s;
white-space:pre-wrap;
}
#texto span.show{
opacity:1;
filter:blur(0);
}

/* MAIN */
.main{
opacity:0;
transition:2s;
}
.main.show{opacity:1;}

/* HERO VIDEO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* SECCIONES */
section{
padding:60px 20px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
margin:20px;
border-radius:20px;
}

/* BOTONES */
.btn{
display:inline-block;
padding:12px 20px;
border-radius:20px;
background:#2e7d32;
color:#fff;
text-decoration:none;
margin:10px;
}

/* FORM */
input,textarea{
width:80%;
padding:10px;
margin:10px;
border-radius:10px;
border:none;
}

</style>
</head>

<body>

<video class="bg-video" id="video" autoplay muted loop>
<source src="doble.mp4">
</video>
<div class="overlay" id="overlay"></div>

<!-- INTRO -->
<div class="intro" id="intro">
<div class="envelope" onclick="abrirSobre()">
<div class="envelope-back"></div>
<div class="envelope-flap"></div>
</div>
<div class="hint">Toca el sobre para abrir</div>
</div>

<!-- CARTA -->
<div class="letter" id="carta">
<div id="texto"></div>
</div>

<!-- CONTENIDO -->
<div class="main" id="main">

<div class="hero">
<h1>Ivon & Julio</h1>
</div>

<section>
<h2>Detalles del Evento</h2>

<p>
La misa se celebrará a las 7:00 PM<br>
Parroquia San José – Jesús María<br><br>

La recepción será en:<br><br>

Llegar temprano<br>
Llevar abrigo
</p>

<a href="https://maps.app.goo.gl/CqNcsCcYM4gEs4K17" target="_blank" class="btn">
📍 Google Maps
</a>

<a href="https://ul.waze.com/ul?place=ChIJv2CrSkDJBZERkocHAm6SlYM&ll=-12.06412670%2C-77.08234230&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location" target="_blank" class="btn">
🚗 Waze
</a>

</section>

<section>
<h2>Álbum de Fotos</h2>
<input type="file" multiple>
</section>

<section>
<h2>Enviar mensaje a los novios</h2>
<input placeholder="Tu nombre">
<textarea placeholder="Escribe tu mensaje"></textarea>
</section>

</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>

const mensaje = `Eres una persona muy especial para nosotros,

y queremos invitarte a compartir
uno de los días más importantes de nuestras vidas.

Nos encantaría contar contigo
en este momento lleno de amor y felicidad 💍`;

function efectoTinta(){
let cont=document.getElementById("texto");
cont.innerHTML="";

[...mensaje].forEach((l,i)=>{
let s=document.createElement("span");
s.textContent=l;
cont.appendChild(s);
setTimeout(()=>s.classList.add("show"),i*20);
});
}

function abrirSobre(){

let env=document.querySelector(".envelope");
let carta=document.getElementById("carta");

env.classList.add("open");

setTimeout(()=>{
env.classList.add("drop");
carta.classList.add("show");
},1000);

setTimeout(()=>{
carta.classList.add("expand");
efectoTinta();
},2000);

let duracion = mensaje.length * 20 + 4000;

setTimeout(()=>{
carta.classList.add("fade");
},duracion);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").classList.add("show");
document.getElementById("video").classList.add("show");
document.getElementById("overlay").classList.add("show");
document.getElementById("musica").play().catch(()=>{});
},duracion+3000);

}

</script>

</body>
</html>
