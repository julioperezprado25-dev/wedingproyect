<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivon & Julio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
color:#2b2b2b;
overflow-x:hidden;

background:
url('papel.png'),
linear-gradient(#f5e6c8,#f2ddb5);

background-size:300px,cover;
}

/* ===== 🌿 CONTENEDOR ===== */
.flor-box{
position:fixed;
width:220px;
z-index:2;
pointer-events:none;
}

/* POSICIONES */
.top-left{top:0; left:0;}
.bottom-left{bottom:0; left:0;}
.right-center{top:50%; right:0; transform:translateY(-50%);}

/* ESPEJO */
.mirror{transform:scaleX(-1);}

/* ===== 🌿 CAPAS ===== */
.flor{
width:100%;
position:absolute;
top:0;
left:0;
}

/* ===== ✂️ RECORTES ===== */

/* BASE (zona central fija) */
.base{
clip-path: polygon(
20% 30%,
70% 30%,
70% 70%,
20% 70%
);
}

/* PARTE SUPERIOR */
.top{
clip-path: polygon(
0% 0%,
60% 0%,
60% 30%,
30% 30%,
30% 100%,
0% 100%
);
}

/* PARTE DERECHA */
.right{
clip-path: polygon(
60% 40%,
100% 40%,
100% 100%,
60% 100%
);
}

/* ===== 🌬️ ANIMACIONES ===== */

@keyframes vientoTop{
0%{transform:rotate(0deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(0deg);}
}

@keyframes vientoRight{
0%{transform:rotate(0deg) translateX(0px);}
50%{transform:rotate(-2deg) translateX(-2px);}
100%{transform:rotate(0deg) translateX(0px);}
}

/* APLICACIÓN */
.anim-top{
animation:vientoTop 4s infinite ease-in-out;
transform-origin:bottom left;
}

.anim-right{
animation:vientoRight 5.5s infinite ease-in-out;
transform-origin:left center;
}

/* ===== FONDOS ===== */
.bg-container{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
z-index:-2;
pointer-events:none;
}

.bg-img{
position:absolute;
width:75%;
max-width:800px;
border-radius:20px;
opacity:0.12;
animation:respirar 14s infinite ease-in-out;
}

.bg2{animation-delay:7s;}

@keyframes respirar{
0%{opacity:0.08;transform:scale(0.95);}
50%{opacity:0.25;transform:scale(1);}
100%{opacity:0.08;transform:scale(0.95);}
}

/* ===== INTRO ===== */
.intro{
position:fixed;
width:100vw;height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:#fff;
}

/* SOBRE */
.envelope{
position:relative;
width:300px;
height:200px;
transition:1s;
}

.envelope-body{
background:linear-gradient(145deg,#f0d28a,#d9b36a);
width:100%;height:100%;
border-radius:10px;
}

.envelope-flap{
position:absolute;
top:0;
width:100%;
height:100px;
background:#e0b96e;
clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
transform-origin:top;
transition:1s;
}

.envelope.open .envelope-flap{
transform:rotateX(180deg);
}

/* SELLO */
.seal{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:70px;height:70px;
background:#7f0000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* TEXTO */
.hint{
position:absolute;
bottom:-35px;
left:50%;
transform:translateX(-50%);
font-family:'Great Vibes';
font-size:22px;
animation:brillo 1.5s infinite;
}

@keyframes brillo{
0%,100%{opacity:0.4;}
50%{opacity:1;}
}

/* CARTA */
.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.3);
width:90%;
max-width:600px;
padding:25px;
border-radius:10px;
opacity:0;
transition:2s;
z-index:10000;

background:
url('papel.png'),
#f4e4c1;

font-family:'Great Vibes';
font-size:24px;
text-align:center;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.letter.fade{opacity:0;}

#texto span{
opacity:0;
filter:blur(10px);
animation:rebuild 1.2s forwards;
}

@keyframes rebuild{
to{opacity:1;filter:blur(0);}
}

/* MAIN */
.main{opacity:0;transition:2s;}
.main.show{opacity:1;}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.icon{
width:70px;
margin:20px auto;
animation:flotar 4s infinite ease-in-out;
}

@keyframes flotar{
50%{transform:translateY(-10px);}
}

section{
padding:40px;
margin:15px;
border-radius:20px;
background:transparent;
}

.btn{
padding:10px 18px;
border-radius:20px;
background:#2e7d32;
color:#fff;
cursor:pointer;
margin:8px;
display:inline-block;
}

#galeria img{
width:120px;
margin:8px;
border-radius:10px;
}

@media(max-width:480px){
.letter{font-size:20px;}
.envelope{width:260px;height:180px;}
.flor-box{width:140px;}
}
</style>
</head>

<body>

<!-- 🌿 ESQUINA SUPERIOR IZQUIERDA -->
<div class="flor-box top-left">
  <img src="flores_izquierdaU.png" class="flor base">
  <img src="flores_izquierdaU.png" class="flor top anim-top">
  <img src="flores_izquierdaU.png" class="flor right anim-right">
</div>

<!-- 🌿 ESQUINA INFERIOR IZQUIERDA -->
<div class="flor-box bottom-left">
  <img src="flores_izquierdaD.png" class="flor base">
  <img src="flores_izquierdaD.png" class="flor top anim-top">
  <img src="flores_izquierdaD.png" class="flor right anim-right">
</div>

<!-- 🌿 DERECHA CENTRO -->
<div class="flor-box right-center mirror">
  <img src="flores_derechaC.png" class="flor base">
  <img src="flores_derechaC.png" class="flor top anim-top">
  <img src="flores_derechaC.png" class="flor right anim-right">
</div>

<!-- RESTO DEL CÓDIGO (SIN CAMBIOS) -->
<!-- (todo lo demás queda igual que tu código original) -->

</body>
</html>
